<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link href="style.css" rel="stylesheet">
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="app-container text-center p-5 shadow-lg rounded-5">
        <h1 class="mb-4 fw-bold title-text">Thời gian tập trung</h1>

        <!-- Settings -->
        <div class="mb-4 d-flex justify-content-center align-items-center gap-3">
            <label for="time-input" class="fw-bold fs-5 text-light opacity-75">Cài đặt (phút):</label>
            <input type="number" id="time-input"
                class="form-control text-center bg-transparent text-white fw-bold fs-4 custom-input shadow-none"
                value="25" min="1" max="75"
                style="width: 100px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2);">
        </div>

        <!-- Timer Circle -->
        <div
            class="timer-circle rounded-circle mx-auto d-flex align-items-center justify-content-center mb-5 position-relative">
            <!-- SVG Progress Ring can be added here for extra flair, but we stick to pure HTML/CSS as requested -->
            <h2 id="time-display" class="display-1 fw-bold text-gradient m-0">25:00</h2>
        </div>

        <!-- Controls -->
        <div class="d-flex justify-content-center gap-4">
            <button id="start-btn"
                class="btn btn-primary btn-lg px-5 py-3 rounded-pill fw-bold shadow-sm action-btn">Bắt đầu</button>
            <button id="reset-btn"
                class="btn btn-outline-light btn-lg px-5 py-3 rounded-pill fw-bold shadow-sm bg-dark bg-opacity-25 custom-outline">Làm
                mới</button>
        </div>
    </div>

    <!-- Alarm Audio -->
    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"
        preload="auto"></audio>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>

</html>
